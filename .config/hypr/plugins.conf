# ---------- Hyprpm Plugin Config ----------------------------------------------
# plugin installation
# hyprpm add <github-url>
# hyprpm enable <plugin>
# hyprpm update
# hyprpm list

plugin {
    # https://github.com/outfoxxed/hy3
    hy3 {
        no_gaps_when_only = yes

        autotile {
            enable = yes
            trigger_width = 800
            trigger_height = 500
        }

        tabs {
            height = 5
            padding = 8
            render_text = false
        }
    }
}
