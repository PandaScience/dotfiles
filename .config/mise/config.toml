[settings]
experimental = true

[shell_alias]
claude = "nono run --allow-cwd --profile claude-custom -- claude"

# NOTE: enable this only in local configs, comes with performance penalty!
# https://mise.jdx.dev/configuration.html#idiomatic-version-files
# idiomatic_version_file_enable_tools = ["terraform", "opentofu", "python"]

[tools]
# required for auto-completion by mise itself
usage = "latest"

# ai
claude = "latest"
"github:always-further/nono" = "latest"

# go
"go:golang.org/x/pkgsite/cmd/pkgsite" = "latest"
"go:github.com/kisielk/errcheck" = "latest"

# misc
viddy = "latest"
kafkactl = "latest"
oras = "latest"
"github:lindell/multi-gitter" = "latest"

# eso
opa = "latest"
regal = "latest"
kcl = "latest"
# "aqua:kcl-lang/kcl" = "latest" # https://github.com/kcl-lang/kcl.nvim/issues/18

# cloud
aws-cli = "latest"

# IaC
terraform = "latest"
opentofu = "latest"
"github:busser/tfautomv" = "latest"
terraform-docs = "latest"

# k8s
kubectl = "latest"
"aqua:kubecolor/kubecolor" = "latest"
kubeswitch = "latest"
krew = "latest"
k9s = "latest"
argocd = "latest"
flux2 = "2.5.1"
istioctl = "latest"
crossplane-cli = "latest"
"github:vitobotta/hetzner-k3s" = "latest"
kubebuilder = "latest"
kind = "latest"
kyverno = "latest"
velero = "latest"
# "http:up" = {version = "v0.41.0", url = "https://cli.upbound.io/stable/{{version}}/bin/linux_amd64/up"} # or version="current"

