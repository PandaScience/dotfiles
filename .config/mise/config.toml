[settings]
experimental = true

[shell_alias]
claude = "nono run --allow-cwd --profile claude-custom -- claude"

# NOTE: enable this only in local configs, comes with performance penalty!
# https://mise.jdx.dev/configuration.html#idiomatic-version-files
# idiomatic_version_file_enable_tools = ["terraform", "opentofu", "python"]

[tools]
# required for auto-completion by mise itself
"aqua:jdx/usage" = "3.2.0"

# ai
"aqua:anthropics/claude-code" = "2.1.85"
"github:always-further/nono" = "0.25.0"

# go
# pkgsite has no git tags or releases, so we have to use the latest version
"go:golang.org/x/pkgsite/cmd/pkgsite" = "latest"
"go:github.com/kisielk/errcheck" = "1.10.0"

# misc
"aqua:sachaos/viddy" = "1.3.0"
"aqua:deviceinsight/kafkactl" = "5.18.0"
"aqua:oras-project/oras" = "1.3.1"
"github:lindell/multi-gitter" = "0.63.0"

# eso
"aqua:open-policy-agent/opa" = "1.15.0"
"aqua:open-policy-agent/regal" = "0.39.0"
"aqua:kcl-lang/cli" = "0.12.4"
# "aqua:kcl-lang/kcl" = "latest" # https://github.com/kcl-lang/kcl.nvim/issues/18

# cloud
"aqua:aws/aws-cli" = "2.34.18"

# IaC
"aqua:hashicorp/terraform" = "1.14.8"
"aqua:opentofu/opentofu" = "1.11.5"
"github:busser/tfautomv" = "0.7.0"
"aqua:terraform-docs/terraform-docs" = "0.21.0"

# k8s
"aqua:kubernetes/kubernetes/kubectl" = "1.35.3"
"aqua:kubecolor/kubecolor" = "0.5.3"
"aqua:danielfoehrKn/kubeswitch" = "0.9.3"
"aqua:kubernetes-sigs/krew" = "0.5.0"
"aqua:derailed/k9s" = "0.50.18"
"aqua:argoproj/argo-cd" = "3.3.5"
"aqua:fluxcd/flux2" = "2.5.1"
"aqua:istio/istio/istioctl" = "1.29.1"
"aqua:crossplane/crossplane" = "2.2.0"
"github:vitobotta/hetzner-k3s" = "2.4.6"
"aqua:kubernetes-sigs/kubebuilder" = "4.13.1"
"aqua:kubernetes-sigs/kind" = "0.31.0"
"aqua:kyverno/kyverno" = "1.17.1"
"aqua:vmware-tanzu/velero" = "1.18.0"

