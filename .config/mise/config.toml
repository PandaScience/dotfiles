[settings]
experimental = true

[shell_alias]
claude = "nono run --allow-cwd --profile claude-custom -- claude"

# NOTE: enable this only in local configs, comes with performance penalty!
# https://mise.jdx.dev/configuration.html#idiomatic-version-files
# idiomatic_version_file_enable_tools = ["terraform", "opentofu", "python"]

[tools]
# required for auto-completion by mise itself
usage = "3.2.0"

# ai
claude = "2.1.85"
"github:always-further/nono" = "0.25.0"

# go
# pkgsite has no git tags or releases, so we have to use the latest version
"go:golang.org/x/pkgsite/cmd/pkgsite" = "latest"
"go:github.com/kisielk/errcheck" = "1.10.0"

# misc
viddy = "1.3.0"
kafkactl = "5.18.0"
oras = "1.3.1"
"github:lindell/multi-gitter" = "0.63.0"

# eso
opa = "1.15.0"
regal = "0.39.0"
kcl = "0.12.4"
# "aqua:kcl-lang/kcl" = "latest" # https://github.com/kcl-lang/kcl.nvim/issues/18

# cloud
aws-cli = "2.34.18"

# IaC
terraform = "1.14.8"
opentofu = "1.11.5"
"github:busser/tfautomv" = "0.7.0"
terraform-docs = "0.21.0"

# k8s
kubectl = "1.35.3"
"aqua:kubecolor/kubecolor" = "0.5.3"
kubeswitch = "0.9.3"
krew = "0.5.0"
k9s = "0.50.18"
argocd = "3.3.5"
flux2 = "2.5.1"
istioctl = "1.29.1"
crossplane-cli = "2.2.0"
"github:vitobotta/hetzner-k3s" = "2.4.6"
kubebuilder = "4.13.1"
kind = "0.31.0"
kyverno = "1.17.1"
velero = "1.18.0"

# krew plugins
# - get-all
# - rbac-tool
# - tree
# - who-can
# - resource-capacity
# - blame
