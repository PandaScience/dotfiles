name: Renovate

on:
  schedule:
    - cron: "0 8 * * 5" # every Friday at 08:00 UTC
  workflow_dispatch: # allow manual runs

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          # required permissions: https://docs.renovatebot.com/modules/platform/github/#running-as-a-github-app
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - uses: renovatebot/github-action@eb932558ad942cccfd8211cf535f17ff183a9f74 # v46.1.9
        with:
          configurationFile: .github/renovate.json
          token: ${{ steps.app-token.outputs.token }}
        env:
          # LOG_LEVEL: debug
          RENOVATE_PLATFORM_COMMIT: "true"
          RENOVATE_AUTODISCOVER: "true"
